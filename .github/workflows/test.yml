# Test Pipeline - Lint, Unit, E2E, Burn-In
# Generated by TEA (Test Architect) CI workflow
# Stack: frontend (React PWA) | Frameworks: Vitest + Playwright

name: Tests

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    - cron: '0 2 * * 0' # Weekly burn-in on Sundays at 2 AM UTC
  workflow_dispatch:

concurrency:
  group: tests-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  # ============================================
  # Stage 1: Lint, Type Check, Format
  # ============================================
  lint:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - run: npm ci

      - name: ESLint
        run: npm run lint

      - name: TypeScript
        run: npm run typecheck

      - name: Prettier
        run: npm run format:check

  # ============================================
  # Stage 2: Unit Tests (Vitest)
  # ============================================
  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - run: npm ci

      - name: Run unit tests with coverage
        run: npm run test:unit:coverage

      - name: Upload coverage
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: unit-test-coverage
          path: coverage/
          retention-days: 7

  # ============================================
  # Stage 3: Database Tests (pgTAP)
  # ============================================
  db-tests:
    name: Database Tests
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - run: npm ci

      - name: Setup Supabase Local
        uses: ./.github/actions/setup-supabase

      - name: Run pgTAP tests
        run: npx supabase test db

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

  # ============================================
  # Stage 4a: E2E P0 Gate (Fast Feedback)
  # ============================================
  e2e-p0:
    name: E2E P0 Gate
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    needs: [lint]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - run: npm ci

      - name: Setup Supabase Local
        uses: ./.github/actions/setup-supabase

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run P0 tests
        run: npx playwright test tests/e2e --project=chromium --grep "\[P0\]"

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

      - name: Upload P0 results
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: e2e-p0-results
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ============================================
  # Stage 4b: E2E Full (Sharded)
  # ============================================
  e2e-tests:
    name: E2E (Shard ${{ matrix.shard }}/2)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    needs: [e2e-p0]
    strategy:
      fail-fast: false
      matrix:
        shard: [1, 2]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        id: pw-cache
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}
          restore-keys: ${{ runner.os }}-playwright-

      - run: npm ci

      - name: Setup Supabase Local
        uses: ./.github/actions/setup-supabase

      - name: Install Playwright browsers
        if: steps.pw-cache.outputs.cache-hit != 'true'
        run: npx playwright install --with-deps chromium

      - name: Install Playwright system deps
        if: steps.pw-cache.outputs.cache-hit == 'true'
        run: npx playwright install-deps chromium

      - name: Run E2E tests (shard ${{ matrix.shard }}/2)
        run: npx playwright test --shard=${{ matrix.shard }}/2

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: e2e-results-shard-${{ matrix.shard }}
          path: |
            test-results/
            playwright-report/
          retention-days: 30

  # ============================================
  # Stage 5: Burn-In (Flaky Detection)
  # Only on PRs to main — runs changed specs 5x
  # ============================================
  burn-in:
    name: Burn-In (Flaky Detection)
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    if: github.event_name == 'pull_request' && github.base_ref == 'main'
    needs: [e2e-tests]
    env:
      CI: 'true'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - run: npm ci

      - name: Setup Supabase Local
        uses: ./.github/actions/setup-supabase

      - name: Install Playwright system deps
        run: npx playwright install-deps chromium

      - name: Detect changed test files
        id: changed-tests
        run: |
          CHANGED=$(git diff --name-only origin/${{ github.base_ref }}...HEAD | grep -E '\.(spec|test)\.(ts|tsx|js|jsx)$' || true)
          echo "specs<<EOF" >> "$GITHUB_OUTPUT"
          echo "$CHANGED" >> "$GITHUB_OUTPUT"
          echo "EOF" >> "$GITHUB_OUTPUT"

      - name: Run burn-in (5 iterations)
        if: steps.changed-tests.outputs.specs != ''
        env:
          SPECS: ${{ steps.changed-tests.outputs.specs }}
        run: |
          echo "Running 5 iterations on changed test files"
          for i in {1..5}; do
            echo "--- Burn-in iteration $i/5 ---"
            npx playwright test $SPECS || exit 1
          done
          echo "Burn-in passed: 5/5 stable"

      - name: Skip burn-in (no test changes)
        if: steps.changed-tests.outputs.specs == ''
        run: echo "No test files changed — burn-in skipped"

      - name: Stop Supabase
        if: always()
        run: supabase stop --no-backup

      - name: Upload burn-in failures
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: burn-in-failures
          path: |
            test-results/
            playwright-report/
          retention-days: 7

  # ============================================
  # Stage 6: Merge Reports
  # ============================================
  merge-reports:
    name: Merge Reports
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [e2e-tests]
    if: always() && needs.e2e-tests.result != 'cancelled'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: '.mise.toml'
          cache: 'npm'

      - run: npm ci

      - name: Download shard results
        uses: actions/download-artifact@v4
        with:
          pattern: e2e-results-shard-*
          path: all-results/
          merge-multiple: true

      - name: Merge Playwright reports
        run: |
          if [ -d "all-results" ] && [ "$(ls -A all-results 2>/dev/null)" ]; then
            npx playwright merge-reports --reporter=html all-results/ || echo "Merge skipped"
          else
            echo "No results to merge"
          fi

      - name: Upload merged report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: merged-playwright-report
          path: playwright-report/
          retention-days: 30

  # ============================================
  # Summary (branch protection target)
  # ============================================
  test-summary:
    name: Test Summary
    runs-on: ubuntu-latest
    permissions:
      contents: read
    needs: [lint, unit-tests, db-tests, e2e-tests]
    if: always()
    steps:
      - name: Evaluate results
        run: |
          echo "Lint:       ${{ needs.lint.result }}"
          echo "Unit Tests: ${{ needs.unit-tests.result }}"
          echo "DB Tests:   ${{ needs.db-tests.result }}"
          echo "E2E Tests:  ${{ needs.e2e-tests.result }}"

          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.unit-tests.result }}" != "success" ]] || \
             [[ "${{ needs.db-tests.result }}" != "success" ]] || \
             [[ "${{ needs.e2e-tests.result }}" != "success" ]]; then
            echo "One or more stages failed"
            exit 1
          fi
          echo "All stages passed"
