name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize]

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.CLAUDE_PAT }}
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          prompt: |
            You are reviewing PR #${{ github.event.pull_request.number }} in ${{ github.repository }}.

            ## AUTHORITATIVE SOURCE - READ FIRST

            **The `docs/project_context.md` file is THE LAW of this codebase.**

            Before reviewing code, read `docs/project_context.md`. It contains all project rules:
            - Technology stack versions and critical notes
            - TypeScript strict mode rules
            - React 19 requirements
            - Testing rules (anti-patterns to flag)
            - Critical don't-miss rules (Tier 1: Instant Failure, Tier 2: Flaky CI)

            **All code MUST conform to `docs/project_context.md`. Flag violations as CRITICAL.**

            ## Review Mission
            Primary goal: Catch bugs before production. Enforce patterns that prevent bugs.

            ## Priority 1: MUST Flag (Bug Prevention)

            **TypeScript Strict Mode Violations:**
            - `any` usage (should be `unknown`)
            - Missing null/undefined handling
            - Unchecked array access without bounds check or `.at()`
            - Type assertions (`as`) without type guards

            **React 19 Server/Client Boundary Errors:**
            - Hooks in Server Components (missing `'use client'`)
            - Async component without Suspense boundary
            - Server Action without `'use server'` directive
            - Missing Zod validation in Server Actions

            **State Management Bugs:**
            - Zustand: subscribing to entire store instead of selectors
            - TanStack Query: missing `invalidateQueries` after mutations
            - Optimistic updates without rollback handling

            ## Priority 2: SHOULD Flag (Pattern Enforcement)

            **E2E Test Anti-Patterns (CRITICAL):**
            - Error swallowing: `.catch(() => false)`, `.catch(() => null)`
            - Conditional flow: `if (await element.isVisible())`
            - Hard waits: `waitForTimeout()`, `setTimeout`
            - Runtime `test.skip()` inside test bodies
            - CSS class selectors instead of `getByRole`, `getByLabel`

            **Unit Test Issues:**
            - Missing `vi.mock("server-only", () => ({}))`
            - Implementation-coupled tests
            - Missing `vi.clearAllMocks()` in `beforeEach`

            **React Patterns:**
            - Missing `useTransition` for expensive state updates
            - Missing `useDeferredValue` for search/filter inputs

            ## Priority 3: DO NOT Flag (Ignore)

            - Formatting (Prettier handles it)
            - Import ordering, naming preferences
            - Comments and documentation suggestions
            - Micro-optimizations without measurable impact
            - Theoretical security issues without exploit vectors
            - ESLint-covered issues

            ## Review Style

            - Be direct: "This will cause X bug"
            - Explain why with consequences
            - Suggest specific fixes with code
            - Mention each issue once, reference other locations
            - Use severity: CRITICAL / HIGH / MEDIUM / LOW

            ## Instructions

            1. Read `docs/project_context.md` FIRST - this is THE LAW of the codebase
            2. Read `CLAUDE.md` for quick reference
            3. Use `gh pr diff ${{ github.event.pull_request.number }}` to get the changes
            4. Review only the changed code, not the entire codebase
            5. Focus on Priority 1 and Priority 2 issues only
            6. Flag any violations of `docs/project_context.md` as CRITICAL
            7. Use `gh pr comment ${{ github.event.pull_request.number }} --body "YOUR_REVIEW"` to post review

            If the code is clean with no Priority 1 or 2 issues, post a brief approval comment.

          claude_args: '--max-turns 15 --allowed-tools "Bash(gh pr diff:*),Bash(gh pr view:*),Bash(gh pr comment:*),Read,Glob,Grep"'
