name: Bundle Size

on:
  pull_request:
    branches: [main, develop]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: bundle-size-${{ github.ref }}
  cancel-in-progress: true

jobs:
  bundle-size:
    name: Check Bundle Size
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Check compressed bundle size
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_DEFAULT_KEY: ${{ secrets.VITE_SUPABASE_ANON_KEY }}
          VITE_SENTRY_DSN: ${{ secrets.VITE_SENTRY_DSN }}
        uses: preactjs/compressed-size-action@v2
        with:
          build-script: build
          pattern: './dist/**/*.{js,mjs,cjs,css}'
          strip-hash: '\-[A-Za-z0-9_-]{8}\.'
          compression: brotli
          minimum-change-threshold: 100
